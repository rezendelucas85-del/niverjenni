<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu 30º Aniversário - 29 de Abril</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container-main">
        <!-- Fundo animado -->
        <div class="background-animation">
            <div class="bubble bubble1"></div>
            <div class="bubble bubble2"></div>
            <div class="bubble bubble3"></div>
            <div class="bubble bubble4"></div>
            <div class="bubble bubble5"></div>
        </div>

        <!-- Confete de fundo -->
        <div class="confetti" id="confetti"></div>

        <!-- Conteúdo principal -->
        <div class="banner-content">
            <!-- Número grande 30 -->
            <div class="number-30">
                <span>30</span>
            </div>

            <!-- Decoração de balões -->
            <div class="balloons">
                <div class="balloon balloon-left"></div>
                <div class="balloon balloon-center"></div>
                <div class="balloon balloon-right"></div>
            </div>

            <!-- Texto principal -->
            <h1 class="title">Estou Completando</h1>
            <h2 class="subtitle">30 ANOS!</h2>

            <!-- Descrição -->
            <p class="description">
                Você está convidado a celebrar comigo esse momento especial!
            </p>

            <!-- Informações da festa -->
            <div class="event-info">
                <div class="info-item">
                    <i class="fas fa-calendar-check"></i>
                    <div class="info-text">
                        <strong>Quarta-feira</strong>
                        <p>29 de Abril de 2026</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-clock"></i>
                    <div class="info-text">
                        <strong>Horário</strong>
                        <p>A Confirmar</p>
                    </div>
                </div>

                <div class="info-item">
                    <i class="fas fa-map-marker-alt"></i>
                    <div class="info-text">
                        <strong>Local</strong>
                        <p>Será Informado</p>
                    </div>
                </div>
            </div>

            <!-- Botões de ação -->
            <div class="action-buttons">
                <button class="btn btn-primary" onclick="confirmarPresenca()">
                    <i class="fas fa-heart"></i> Confirmar Presença
                </button>
                <button class="btn btn-secondary" onclick="compartilhar()">
                    <i class="fas fa-share-alt"></i> Compartilhar
                </button>
            </div>

            <!-- Mensagem especial -->
            <div class="special-message">
                <p>✨ Sua presença é o melhor presente! ✨</p>
            </div>
        </div>

        <!-- Rodapé com decoração -->
        <div class="footer-decoration">
            <div class="star star1">⭐</div>
            <div class="star star2">⭐</div>
            <div class="star star3">⭐</div>
            <div class="star star4">⭐</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
